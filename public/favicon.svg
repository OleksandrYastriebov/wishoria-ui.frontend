<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Amber gradient background -->
  <rect width="32" height="32" rx="7.5" fill="url(#bg)"/>
  <!-- Subtle top shine -->
  <rect width="32" height="17" rx="7.5" fill="url(#shine)"/>

  <!-- Main 4-pointed sparkle star: center (14,16), outer r=7, inner r=2.5 -->
  <path d="M14 9 L15.77 14.23 L21 16 L15.77 17.77 L14 23 L12.23 17.77 L7 16 L12.23 14.23 Z" fill="white"/>

  <!-- Small sparkle star: center (23.5,10), outer r=3, inner r=1.1 -->
  <path d="M23.5 7 L24.28 9.22 L26.5 10 L24.28 10.78 L23.5 13 L22.72 10.78 L20.5 10 L22.72 9.22 Z" fill="white" opacity="0.88"/>

  <!-- Tiny sparkle dot bottom right -->
  <circle cx="23.5" cy="21.5" r="1.4" fill="white" opacity="0.72"/>
</svg>
