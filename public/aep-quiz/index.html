<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AJO Certification Practice Test</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #222535;
      --border: #2e3148;
      --accent: #eb1000;
      --accent2: #ff6b5b;
      --text: #e8eaf6;
      --text-muted: #8892b0;
      --correct: #26d96b;
      --correct-bg: #0d2b1b;
      --wrong: #ff4d4d;
      --wrong-bg: #2b0d0d;
      --warning: #ffb347;
      --white: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HOME SCREEN ─────────────────────────────────────────────── */
    #home {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
      text-align: center;
    }

    .logo {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .home-title {
      font-size: clamp(26px, 5vw, 42px);
      font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    .home-subtitle {
      font-size: 16px;
      color: var(--text-muted);
      margin-bottom: 40px;
      max-width: 500px;
    }

    .modules-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 900px;
      margin-bottom: 32px;
    }

    .module-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px 20px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      position: relative;
      overflow: hidden;
    }

    .module-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transform: scaleX(0);
      transition: transform 0.2s;
    }

    .module-card:hover::before,
    .module-card.loaded::before { transform: scaleX(1); }

    .module-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(235,16,0,0.15);
    }

    .module-card.loading {
      opacity: 0.6;
      cursor: wait;
    }

    .module-card.loaded {
      border-color: var(--border);
    }

    .module-num {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .module-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .module-count {
      font-size: 13px;
      color: var(--text-muted);
    }

    .module-status {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      margin-top: 8px;
    }

    .status-loading { background: rgba(255,179,71,0.15); color: var(--warning); }
    .status-ready   { background: rgba(38,217,107,0.12); color: var(--correct); }
    .status-error   { background: rgba(255,77,77,0.12); color: var(--wrong); }

    .start-all-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border: none;
      padding: 14px 40px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }

    .start-all-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(235,16,0,0.3);
    }

    .start-all-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* ── QUIZ SCREEN ─────────────────────────────────────────────── */
    #quiz { display: none; min-height: 100vh; }

    .quiz-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .quiz-title-bar {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .quiz-title-bar span {
      color: var(--text);
    }

    .progress-wrap {
      flex: 1;
      min-width: 120px;
      max-width: 300px;
    }

    .progress-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }

    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .score-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    .score-badge .correct-count { color: var(--correct); }
    .score-badge .wrong-count   { color: var(--wrong); }

    .back-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .back-btn:hover {
      border-color: var(--text-muted);
      color: var(--text);
    }

    /* ── QUESTION ─────────────────────────────────────────────────── */
    .quiz-body {
      max-width: 780px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    .question-meta {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .question-text {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.5;
      color: var(--white);
      margin-bottom: 28px;
    }

    .options-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .option-btn {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      text-align: left;
      cursor: pointer;
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
      transition: all 0.15s;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .option-btn:hover:not(:disabled) {
      border-color: var(--accent);
      background: var(--surface2);
    }

    .option-btn:disabled { cursor: default; }

    .option-letter {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 28px;
      border-radius: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      margin-top: 1px;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .option-btn.correct {
      border-color: var(--correct);
      background: var(--correct-bg);
      color: var(--correct);
    }

    .option-btn.correct .option-letter {
      background: var(--correct);
      border-color: var(--correct);
      color: #000;
    }

    .option-btn.wrong {
      border-color: var(--wrong);
      background: var(--wrong-bg);
      color: var(--wrong);
    }

    .option-btn.wrong .option-letter {
      background: var(--wrong);
      border-color: var(--wrong);
      color: #fff;
    }

    .option-btn.reveal-correct {
      border-color: var(--correct);
      background: rgba(38,217,107,0.05);
    }

    .option-btn.reveal-correct .option-letter {
      border-color: var(--correct);
      color: var(--correct);
    }

    /* ── EXPLANATION ──────────────────────────────────────────────── */
    .explanation-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
      margin-top: 8px;
      display: none;
      animation: fadeSlide 0.25s ease;
    }

    .explanation-box.show { display: block; }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .explanation-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .explanation-header.correct-header { color: var(--correct); }
    .explanation-header.wrong-header   { color: var(--wrong); }

    .explanation-icon { font-size: 16px; }

    /* ── MARKDOWN STYLES ──────────────────────────────────────────── */
    .md {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
    }

    .md p { margin-bottom: 10px; }
    .md p:last-child { margin-bottom: 0; }

    .md strong { color: var(--white); font-weight: 600; }
    .md em { color: var(--text-muted); font-style: italic; }

    .md code {
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
      font-family: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 12px;
      color: var(--accent2);
    }

    .md pre {
      background: #0d0f18;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      overflow-x: auto;
      margin: 10px 0;
    }

    .md pre code {
      background: none;
      border: none;
      padding: 0;
      color: #a8d8a8;
      font-size: 13px;
    }

    .md table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      font-size: 13px;
    }

    .md th {
      background: var(--surface);
      color: var(--text);
      font-weight: 600;
      padding: 8px 12px;
      border: 1px solid var(--border);
      text-align: left;
    }

    .md td {
      padding: 7px 12px;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .md tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

    .md ul, .md ol {
      padding-left: 22px;
      margin: 8px 0;
    }

    .md li { margin-bottom: 5px; }
    .md li::marker { color: var(--accent2); }

    .md blockquote {
      border-left: 3px solid var(--accent);
      padding: 4px 14px;
      margin: 10px 0;
      color: var(--text-muted);
      font-style: italic;
    }

    .md h1, .md h2, .md h3, .md h4 {
      color: var(--white);
      margin: 14px 0 8px;
      font-weight: 600;
    }

    .md h4 { font-size: 13px; color: var(--text); }
    .md h3 { font-size: 14px; }

    /* ── NAVIGATION ───────────────────────────────────────────────── */
    .nav-bar {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      margin-top: 32px;
    }

    .nav-btn {
      padding: 11px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text);
    }

    .nav-btn:hover:not(:disabled) {
      border-color: var(--text-muted);
      background: var(--surface2);
    }

    .nav-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .nav-btn.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-color: transparent;
      color: white;
    }

    .nav-btn.primary:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    /* ── RESULTS SCREEN ──────────────────────────────────────────── */
    #results { display: none; min-height: 100vh; }

    .results-body {
      max-width: 700px;
      margin: 0 auto;
      padding: 60px 20px 80px;
      text-align: center;
    }

    .results-badge { font-size: 72px; margin-bottom: 24px; }

    .results-title {
      font-size: 32px;
      font-weight: 800;
      color: var(--white);
      margin-bottom: 8px;
    }

    .results-score {
      font-size: 64px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 16px 0;
    }

    .results-sub {
      font-size: 16px;
      color: var(--text-muted);
      margin-bottom: 40px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 16px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .stat-value.green { color: var(--correct); }
    .stat-value.red   { color: var(--wrong); }
    .stat-value.blue  { color: #6eb4ff; }

    .stat-label { font-size: 12px; color: var(--text-muted); }

    .results-grade {
      font-size: 15px;
      padding: 12px 24px;
      border-radius: 10px;
      margin-bottom: 32px;
      display: inline-block;
      font-weight: 600;
    }

    .grade-pass {
      background: rgba(38,217,107,0.12);
      color: var(--correct);
      border: 1px solid var(--correct);
    }

    .grade-fail {
      background: rgba(255,77,77,0.08);
      color: var(--wrong);
      border: 1px solid var(--wrong);
    }

    .results-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .results-btn {
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      color: white;
    }

    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

    .btn-secondary {
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text);
    }

    .btn-secondary:hover {
      border-color: var(--text-muted);
      background: var(--surface2);
    }

    /* ── REVIEW MODE ─────────────────────────────────────────────── */
    .review-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
    }

    .review-status {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 6px;
      margin-bottom: 8px;
    }

    .review-correct { background: rgba(38,217,107,0.12); color: var(--correct); }
    .review-wrong   { background: rgba(255,77,77,0.1); color: var(--wrong); }

    .review-explanation {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      margin-top: 8px;
    }

    .review-explanation-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    /* ── RESPONSIVE ──────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .quiz-header { padding: 12px 16px; }
      .quiz-body   { padding: 24px 16px 60px; }
      .question-text { font-size: 17px; }
      .stats-grid  { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- ── HOME ──────────────────────────────────────────────────────────── -->
<div id="home">
  <div class="logo">Adobe Journey Optimizer</div>
  <h1 class="home-title">AJO Certification Practice Test</h1>
  <p class="home-subtitle">300 questions across 6 modules covering AEP, Segmentation, Journeys, Decisioning, Governance, and Reporting.</p>

  <div class="modules-grid" id="modulesGrid">
    <div class="module-card loading" id="card-0">
      <div class="module-num">Module 1</div>
      <div class="module-title">Loading…</div>
      <span class="module-status status-loading">Loading</span>
    </div>
  </div>

  <button class="start-all-btn" id="startAllBtn" disabled onclick="startQuiz('all')">
    Start Full Exam (All 300 Questions)
  </button>
</div>

<!-- ── QUIZ ───────────────────────────────────────────────────────────── -->
<div id="quiz">
  <div class="quiz-header">
    <button class="back-btn" onclick="goHome()">← Home</button>
    <div class="quiz-title-bar" id="quizTitleBar">Module</div>
    <div class="progress-wrap">
      <div class="progress-label">
        <span id="progressLabel">Question 1 of 50</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
    <div class="score-badge">
      <span class="correct-count" id="correctCount">0</span> ✓ &nbsp;
      <span class="wrong-count" id="wrongCount">0</span> ✗
    </div>
  </div>

  <div class="quiz-body">
    <div class="question-meta" id="questionMeta"></div>
    <div class="question-text" id="questionText"></div>
    <div class="options-list" id="optionsList"></div>
    <div class="explanation-box" id="explanationBox">
      <div class="explanation-header" id="explanationHeader">
        <span class="explanation-icon"></span>
        <span></span>
      </div>
      <div class="md" id="explanationText"></div>
    </div>
    <div class="nav-bar">
      <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled>← Previous</button>
      <button class="nav-btn primary" id="nextBtn" onclick="navigate(1)" disabled>Next →</button>
    </div>
  </div>
</div>

<!-- ── RESULTS ────────────────────────────────────────────────────────── -->
<div id="results">
  <div class="quiz-header">
    <button class="back-btn" onclick="goHome()">← Home</button>
    <div class="quiz-title-bar">Results</div>
    <div></div>
  </div>
  <div class="results-body">
    <div class="results-badge" id="resultsBadge"></div>
    <h2 class="results-title" id="resultsTitle"></h2>
    <div class="results-score" id="resultsScore"></div>
    <p class="results-sub" id="resultsSub"></p>
    <div class="grade-pass" id="resultsGrade" style="display:none"></div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value green" id="statCorrect">0</div>
        <div class="stat-label">Correct Answers</div>
      </div>
      <div class="stat-card">
        <div class="stat-value red" id="statWrong">0</div>
        <div class="stat-label">Wrong Answers</div>
      </div>
      <div class="stat-card">
        <div class="stat-value blue" id="statSkipped">0</div>
        <div class="stat-label">Unanswered</div>
      </div>
    </div>

    <div class="results-actions">
      <button class="results-btn btn-primary" onclick="reviewAnswers()">Review All Answers</button>
      <button class="results-btn btn-secondary" onclick="restartQuiz()">Retake This Test</button>
      <button class="results-btn btn-secondary" onclick="goHome()">Choose Module</button>
    </div>

    <hr class="review-divider" />
    <div id="reviewList"></div>
  </div>
</div>

<script>
// ── MARKED CONFIG ─────────────────────────────────────────────────────
marked.setOptions({ breaks: true, gfm: true });

function renderMd(text) {
  return marked.parse(text || '');
}

// ── STATE ─────────────────────────────────────────────────────────────
const state = {
  modules: [],
  current: [],
  idx: 0,
  answers: {},
  correctScore: 0,
  wrongScore: 0,
  activeModule: null,
};

// ── LOADER ────────────────────────────────────────────────────────────
async function loadModules() {
  const grid = document.getElementById('modulesGrid');
  grid.innerHTML = '';
  let i = 1;
  let loadedAny = false;

  while (true) {
    const filename = `questions/questions_0${i}.json`;
    try {
      const res = await fetch(filename);
      if (!res.ok) break;
      const data = await res.json();
      state.modules.push(data);
      const card = createModuleCard(state.modules.length - 1, data);
      grid.appendChild(card);
      loadedAny = true;
      i++;
    } catch (e) {
      break;
    }
  }

  if (!loadedAny) {
    grid.innerHTML = '<p style="color:var(--wrong);grid-column:1/-1">⚠️ No question files found.</p>';
    return;
  }

  document.getElementById('startAllBtn').disabled = false;
  document.getElementById('startAllBtn').textContent =
    `Start Full Exam (All ${state.modules.reduce((s, m) => s + m.questions.length, 0)} Questions)`;
}

function createModuleCard(idx, data) {
  const card = document.createElement('div');
  card.className = 'module-card loaded';
  card.id = `card-${idx}`;
  card.innerHTML = `
    <div class="module-num">Module ${idx + 1}</div>
    <div class="module-title">${data.title}</div>
    <div class="module-count">${data.questions.length} questions</div>
    <span class="module-status status-ready">Ready</span>
  `;
  card.onclick = () => startQuiz(idx);
  return card;
}

// ── START / NAVIGATE ──────────────────────────────────────────────────
function startQuiz(moduleIdx) {
  state.activeModule = moduleIdx;
  state.answers = {};
  state.correctScore = 0;
  state.wrongScore = 0;
  state.idx = 0;

  if (moduleIdx === 'all') {
    state.current = state.modules.flatMap(m => m.questions);
    document.getElementById('quizTitleBar').innerHTML = '<span>Full Exam</span>';
  } else {
    const mod = state.modules[moduleIdx];
    state.current = mod.questions;
    document.getElementById('quizTitleBar').innerHTML =
      `Module ${moduleIdx + 1} — <span>${mod.title}</span>`;
  }

  show('quiz');
  renderQuestion();
}

function navigate(dir) {
  state.idx = Math.max(0, Math.min(state.current.length - 1, state.idx + dir));
  renderQuestion();
}

function goHome() { show('home'); }
function restartQuiz() { startQuiz(state.activeModule); }

// ── RENDER ────────────────────────────────────────────────────────────
function renderQuestion() {
  const q = state.current[state.idx];
  const total = state.current.length;
  const answered = state.idx in state.answers;
  const chosen = state.answers[state.idx];

  document.getElementById('progressLabel').textContent = `Question ${state.idx + 1} of ${total}`;
  const pct = Math.round((state.idx / total) * 100);
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('correctCount').textContent = state.correctScore;
  document.getElementById('wrongCount').textContent = state.wrongScore;

  document.getElementById('questionMeta').textContent = `Question ${state.idx + 1} of ${total}`;
  document.getElementById('questionText').textContent = q.question;

  const letters = ['A', 'B', 'C', 'D'];
  const ol = document.getElementById('optionsList');
  ol.innerHTML = '';

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    if (answered) {
      btn.disabled = true;
      if (i === q.correct) btn.classList.add(chosen === i ? 'correct' : 'reveal-correct');
      if (i === chosen && i !== q.correct) btn.classList.add('wrong');
    }
    btn.innerHTML = `<div class="option-letter">${letters[i]}</div><span>${opt}</span>`;
    if (!answered) btn.onclick = () => selectAnswer(i);
    ol.appendChild(btn);
  });

  const box = document.getElementById('explanationBox');
  const header = document.getElementById('explanationHeader');
  const text = document.getElementById('explanationText');

  if (answered) {
    const isCorrect = chosen === q.correct;
    box.classList.add('show');
    const icon = isCorrect ? '✅' : '❌';
    const label = isCorrect ? 'Correct!' : `Wrong — correct answer: ${letters[q.correct]}`;
    header.className = `explanation-header ${isCorrect ? 'correct-header' : 'wrong-header'}`;
    header.innerHTML = `<span class="explanation-icon">${icon}</span><span>${label}</span>`;
    text.innerHTML = renderMd(q.explanation);
  } else {
    box.classList.remove('show');
  }

  document.getElementById('prevBtn').disabled = state.idx === 0;

  const nextBtn = document.getElementById('nextBtn');
  if (state.idx === total - 1 && answered) {
    nextBtn.textContent = 'See Results →';
    nextBtn.disabled = false;
    nextBtn.onclick = showResults;
  } else {
    nextBtn.textContent = 'Next →';
    nextBtn.onclick = () => navigate(1);
    nextBtn.disabled = !answered;
    if (answered && state.idx < total - 1) nextBtn.disabled = false;
  }
}

function selectAnswer(optionIdx) {
  if (state.idx in state.answers) return;
  const q = state.current[state.idx];
  const isCorrect = optionIdx === q.correct;
  state.answers[state.idx] = optionIdx;
  if (isCorrect) state.correctScore++;
  else state.wrongScore++;
  renderQuestion();
}

// ── RESULTS ──────────────────────────────────────────────────────────
function showResults() {
  const total = state.current.length;
  const correct = state.correctScore;
  const wrong = state.wrongScore;
  const skipped = total - Object.keys(state.answers).length;
  const pct = Math.round((correct / total) * 100);
  const pass = pct >= 68;

  document.getElementById('resultsBadge').textContent = pct >= 90 ? '🏆' : pct >= 68 ? '🎓' : '📚';
  document.getElementById('resultsTitle').textContent =
    pct >= 90 ? 'Outstanding!' : pct >= 68 ? 'You Passed!' : 'Keep Studying';
  document.getElementById('resultsScore').textContent = `${pct}%`;
  document.getElementById('resultsSub').textContent = `${correct} correct out of ${total} questions`;

  const gradeEl = document.getElementById('resultsGrade');
  gradeEl.style.display = 'inline-block';
  gradeEl.className = `results-grade ${pass ? 'grade-pass' : 'grade-fail'}`;
  gradeEl.textContent = pass
    ? `✓ Passing Score — Adobe AJO Certification threshold is ~68%`
    : `✗ Below passing score — Adobe AJO Certification requires ~68%`;

  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('statSkipped').textContent = skipped;
  document.getElementById('reviewList').innerHTML = '';
  show('results');
}

function reviewAnswers() {
  const letters = ['A', 'B', 'C', 'D'];
  const container = document.getElementById('reviewList');
  container.innerHTML = '';

  state.current.forEach((q, i) => {
    const chosen = state.answers[i];
    const answered = i in state.answers;
    const isCorrect = answered && chosen === q.correct;

    const div = document.createElement('div');
    div.style.cssText = 'text-align:left;margin-bottom:32px;';

    const optionsHtml = q.options.map((opt, oi) => {
      let style = 'display:flex;gap:10px;align-items:flex-start;padding:10px 14px;border-radius:8px;margin-bottom:6px;font-size:14px;border:1px solid var(--border);';
      if (oi === q.correct) style += 'border-color:var(--correct);background:var(--correct-bg);color:var(--correct);';
      else if (oi === chosen && !isCorrect) style += 'border-color:var(--wrong);background:var(--wrong-bg);color:var(--wrong);';
      return `<div style="${style}"><b style="min-width:18px">${letters[oi]}.</b> ${opt}</div>`;
    }).join('');

    div.innerHTML = `
      <span class="review-status ${isCorrect ? 'review-correct' : 'review-wrong'}">
        ${isCorrect ? '✓ Correct' : answered ? `✗ Wrong (you chose ${letters[chosen]}, correct: ${letters[q.correct]})` : '— Unanswered'}
      </span>
      <p style="font-weight:600;color:var(--white);margin-bottom:10px;line-height:1.4">${i + 1}. ${q.question}</p>
      ${optionsHtml}
      <div class="review-explanation">
        <div class="review-explanation-label">Explanation</div>
        <div class="md">${renderMd(q.explanation)}</div>
      </div>
    `;
    container.appendChild(div);
  });

  container.scrollIntoView({ behavior: 'smooth' });
}

// ── UTILS ─────────────────────────────────────────────────────────────
function show(screen) {
  ['home', 'quiz', 'results'].forEach(id => {
    document.getElementById(id).style.display = id === screen ? 'block' : 'none';
  });
  if (screen === 'home') document.getElementById('home').style.display = 'flex';
  window.scrollTo(0, 0);
}

// ── BOOT ─────────────────────────────────────────────────────────────
loadModules();
</script>
